<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mushroom Guy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: sans-serif; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    canvas { display: block; }
    #ui { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 16px; z-index: 10; }
    #controls { color: #ccc; font-size: 13px; }
    #coin-counter { padding: 6px 18px; font-size: 15px; font-weight: bold; border: 2px solid #B8860B; border-radius: 6px; background: #FFD700; color: #5a3e00; pointer-events: none; }
    #btn-level1 { padding: 6px 22px; font-size: 15px; font-weight: bold; border: 2px solid #333; border-radius: 6px; cursor: pointer; background: #4CAF50; color: white; }
    #btn-continue { position: fixed; top: 50%; left: 50%; transform: translate(-50%, 60px); padding: 10px 28px; font-size: 17px; font-weight: bold; border: 2px solid #7c3aed; border-radius: 8px; cursor: pointer; background: #6d28d9; color: white; display: none; z-index: 20; }
  </style>
</head>
<body>
  <canvas id="game" width="1200" height="500"></canvas>
  <div id="ui">
    <div id="coin-counter">🪙 0 / 0 collected</div>
    <button id="btn-level1" onclick="startLevel1()">Level 1</button>
  </div>
  <button id="btn-continue" onclick="continueGame()">🗝️ Continue (uses 1 key)</button>
  <div style="display:none">
    <div id="controls">Arrow Keys / WASD to move &nbsp;|&nbsp; Space / W to jump</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const BASE_W = 1200, BASE_H = 500;

    function resizeCanvas() {
      const scaleX = window.innerWidth  / BASE_W;
      const scaleY = window.innerHeight / BASE_H;
      const scale  = Math.min(scaleX, scaleY);
      canvas.style.width  = BASE_W * scale + 'px';
      canvas.style.height = BASE_H * scale + 'px';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Platforms (x, y, width) — matching your sketch layout
    const platforms = [
      { x: 0,   y: 420, w: 220 },                       // ground left (start)
      { x: 280, y: 370, w: 150 },                       // first step
      { x: 500, y: 330, w: 150, moveSpeed: 1,   moveRange: 90,  moveDir: 1 },  // second step — moves
      { x: 750, y: 300, w: 200 },                       // flag platform (highest)
      { x: 80,  y: 310, w: 130, noEnemy: true, conveyor:  2 },  // decoration — pushes right
      { x: 950, y: 375, w: 140, noEnemy: true, conveyor: -2 },  // decoration — pushes left
      { x: 630, y: 255, w: 140, noEnemy: true, moveSpeed: 1.4, moveRange: 70,  moveDir: -1 }, // moves
      { x: 900, y: 164, w: 140 },                       // new line 2 — enemy here
      { x: 960, y: 235, w: 120, noEnemy: true },        // new line 3 — high right
      { x: 1060,y: 335, w: 130, noEnemy: true, conveyor:  2 },  // decoration — pushes right (flag)
    ];

    const GROUND_Y = 420;
    for (const p of platforms) { if (p.moveSpeed) p.baseX = p.x; }

    const player = {
      x: 70,
      y: GROUND_Y - 60,
      w: 40,
      h: 60,
      vx: 0,
      vy: 0,
      onGround: false,
      facingRight: true,
    };

    const SPEED = 4;
    const JUMP_FORCE = -13;
    const GRAVITY = 0.5;

    let maxLives = 3;
    let lives = maxLives;
    let score = 0;
    let gameOver = false;
    let gameWon = false;
    let invincible = 0; // countdown in frames

    // Particles
    const particles = [];
    function spawnCoinParticles(x, y) {
      const colors = ['#FFD700', '#FFF176', '#FFB300', '#FFFFFF'];
      for (let i = 0; i < 10; i++) {
        const angle = (Math.PI * 2 / 10) * i + Math.random() * 0.4;
        const speed = 1.5 + Math.random() * 2.5;
        particles.push({
          x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1,
          life: 1, color: colors[i % colors.length], r: 3 + Math.random() * 2,
        });
      }
    }

    // Screen shake
    let shakeFrames = 0;
    function triggerShake() { shakeFrames = 14; }

    // Clouds
    const clouds = [
      { x: 100,  y: 60,  w: 90,  h: 32 },
      { x: 320,  y: 40,  w: 120, h: 38 },
      { x: 580,  y: 80,  w: 100, h: 30 },
      { x: 820,  y: 50,  w: 110, h: 36 },
      { x: 1050, y: 70,  w: 95,  h: 28 },
    ];

    // Flag sits on the last platform (x:1060, y:335, w:130)
    const flag = { x: 1125, y: 335 };

    const TIMER_LEVELS = [10, 5, 3, 1].map(m => m * 60 * 1000); // progressive difficulty
    let timerLevel = 0;
    function currentTimerMs() { return TIMER_LEVELS[timerLevel]; }
    let timerEnd = null;
    let timerRemaining = currentTimerMs();
    let timeUp = false;
    let paused = true;
    let currentLevel = 1;
    let highScore = parseInt(localStorage.getItem('flagquest_hs') || '0');

    // Keys — 3 per level, floating at fixed positions
    let collectedKeys = 0;
    const levelKeys = [
      { x: 160, y: 275, collected: false },
      { x: 665, y: 215, collected: false },
      { x: 985, y: 195, collected: false },
    ];

    // Coins — 3 per platform, random positions
    const COIN_ATTRACT_RADIUS = 120;
    const COIN_ATTRACT_SPEED  = 4;
    const coins = [];
    const COIN_TIERS = [
      { value: 1, color: '#FFD700', border: '#B8860B' },
      { value: 3, color: '#60a5fa', border: '#1d4ed8' },
      { value: 5, color: '#f472b6', border: '#be185d' },
    ];
    function coinTier() {
      const r = Math.random();
      return r < 0.6 ? COIN_TIERS[0] : r < 0.9 ? COIN_TIERS[1] : COIN_TIERS[2];
    }
    function randomCoinX(p) { return p.x + 10 + Math.random() * Math.max(0, p.w - 20); }
    for (const p of platforms) {
      for (let i = 0; i < 3; i++) {
        const tier = coinTier();
        coins.push({
          x: randomCoinX(p), y: p.y - 14, r: 7, collected: false,
          value: tier.value, color: tier.color, border: tier.border,
        });
      }
    }

    // One enemy per platform, patrolling back and forth
    const enemies = platforms.filter(p => !p.noEnemy).map(p => ({
      x: p.x + p.w - 40,
      y: p.y - 40,
      w: 30,
      h: 40,
      vx: -0.8,
      platform: p,
    }));

    // ── Audio ──────────────────────────────────────────────────────────────
    // AudioContext is created on first user gesture and kept alive.
    // Every sound checks state === 'running' before playing so a suspended
    // context never causes errors — it just skips that sound instance.
    let audioCtx = null;

    function unlockAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function ac() { return audioCtx && audioCtx.state === 'running' ? audioCtx : null; }

    function tone(freq1, freq2, type, vol, dur) {
      const a = ac(); if (!a) return;
      const osc = a.createOscillator(), g = a.createGain();
      osc.connect(g); g.connect(a.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq1, a.currentTime);
      if (freq2 !== freq1) osc.frequency.linearRampToValueAtTime(freq2, a.currentTime + dur);
      g.gain.setValueAtTime(vol, a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
      osc.start(a.currentTime);
      osc.stop(a.currentTime + dur);
    }

    function playJump() { tone(180, 900, 'sine', 0.6, 0.3); }
    function playStep()  { /* muted */ }
    function playLand()  { /* muted */ }
    function playHit()   { /* muted */ }

    // Background music via setInterval — one note at a time, immune to suspension
    const MELODY = [
      392, 392, 440, 392, 523, 494,
      392, 392, 440, 392, 587, 523,
      392, 392, 784, 659, 523, 494, 440,
      698, 698, 659, 523, 587, 523,
    ];
    const NOTE_MS = 180;
    let noteIndex = 0, musicStarted = false;

    function startMusic() { /* muted */ }
    // ───────────────────────────────────────────────────────────────────────

    function resetEnemies(speed) {
      enemies.forEach(e => {
        e.x = e.platform.x + e.platform.w - 40;
        e.vx = -Math.abs(speed);
      });
    }

    function updateCoinCounter() {
      const total = coins.length;
      const collected = coins.filter(c => c.collected).length;
      document.getElementById('coin-counter').textContent = '🪙 ' + collected + ' / ' + total + ' collected';
    }

    function loseLife() {
      if (invincible > 0) return;
      lives--;
      playHit();
      triggerShake();
      if (lives <= 0) { gameOver = true; return; }
      invincible = 90;
      player.x = 70;
      player.y = GROUND_Y - player.h;
      player.vx = 0;
      player.vy = 0;
    }

    let stepTimer = 0;

    const keys = {};
    document.addEventListener('keydown', e => {
      unlockAudio();
      if (gameOver || gameWon) {
        const wasWon = gameWon;
        lives = maxLives; score = 0; gameOver = false; gameWon = false; invincible = 0; timeUp = false;
        collectedKeys = 0; levelKeys.forEach(k => { k.collected = false; });
        if (wasWon) timerLevel = Math.min(timerLevel + 1, TIMER_LEVELS.length - 1);
        timerRemaining = currentTimerMs(); timerEnd = performance.now() + currentTimerMs();
        player.x = 70; player.y = GROUND_Y - player.h;
        player.vx = 0; player.vy = 0;
        coins.forEach(c => { c.collected = false; });
        let ci = 0;
        for (const p of platforms) {
          const count = 3;
          for (let i = 0; i < count; i++) {
            coins[ci].x = p.x + (p.w / (count + 1)) * (i + 1);
            coins[ci].y = p.y - 14;
            ci++;
          }
        }
        updateCoinCounter();
        resetEnemies(currentLevel === 3 ? 4 : currentLevel === 2 ? 2.5 : 0.4);
        return;
      }
      keys[e.code] = true;
    });
    document.addEventListener('keyup',   e => { keys[e.code] = false; });

    function isMovingLeft()  { return keys['ArrowLeft']  || keys['KeyA']; }
    function isMovingRight() { return keys['ArrowRight'] || keys['KeyD']; }
    function isJumping()     { return keys['Space'] || keys['ArrowUp'] || keys['KeyW']; }

    let jumpPressed = false;

    function update() {
      // Timer check
      if (timerEnd && performance.now() >= timerEnd) {
        gameOver = true;
        timeUp = true;
        return;
      }

      // Move platforms
      for (const p of platforms) {
        if (!p.moveSpeed) continue;
        p.x += p.moveSpeed * p.moveDir;
        if (p.x > p.baseX + p.moveRange || p.x < p.baseX - p.moveRange) p.moveDir *= -1;
      }

      // Horizontal movement
      if (isMovingLeft())  { player.vx = -SPEED; player.facingRight = false; }
      else if (isMovingRight()) { player.vx =  SPEED; player.facingRight = true; }
      else player.vx = 0;

      // Jump (only on ground, only on fresh press)
      if (isJumping() && player.onGround && !jumpPressed) {
        player.vy = JUMP_FORCE;
        jumpPressed = true;
        playJump();
      }
      if (!isJumping()) jumpPressed = false;

      // Gravity
      player.vy += GRAVITY;

      // Move
      player.x += player.vx;
      player.y += player.vy;

      // Clamp horizontal to canvas
      player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

      // Footstep sound while walking on ground
      if (player.onGround && player.vx !== 0) {
        stepTimer++;
        if (stepTimer >= 18) { playStep(); stepTimer = 0; }
      } else {
        stepTimer = 0;
      }

      if (invincible > 0) invincible--;

      // Fall off bottom → lose a life, pop back up at same X
      if (player.y > canvas.height) {
        loseLife();
        return;
      }

      // Platform collision (only landing on top)
      const wasOnGround = player.onGround;
      player.onGround = false;
      let activeConveyor = 0;
      let activePlatformVx = 0;
      for (const p of platforms) {
        const prevBottom = player.y + player.h - player.vy;
        const currBottom = player.y + player.h;
        const inX = player.x + player.w > p.x && player.x < p.x + p.w;
        if (inX && prevBottom <= p.y && currBottom >= p.y && player.vy >= 0) {
          player.y = p.y - player.h;
          player.vy = 0;
          player.onGround = true;
          if (p.conveyor) activeConveyor = p.conveyor;
          if (p.moveSpeed) activePlatformVx = p.moveSpeed * p.moveDir;
        }
      }
      if (activeConveyor) {
        player.x += activeConveyor;
        player.facingRight = activeConveyor > 0;
      }
      if (activePlatformVx) player.x += activePlatformVx;
      if (!wasOnGround && player.onGround) playLand();

      // Win condition — player touches the flag
      if (player.onGround &&
          player.x + player.w > flag.x - 18 && player.x < flag.x + 18 &&
          Math.abs(player.y + player.h - flag.y) <= 2) {
        gameWon = true;
        timerRemaining = timerEnd ? Math.max(0, timerEnd - performance.now()) : timerRemaining;
        timerEnd = null;
        const btn = document.getElementById('btn-level1');
        const nextLevel = currentLevel === 3 ? 1 : currentLevel + 1;
        btn.textContent = 'Level ' + nextLevel;
        btn.disabled = false;
        return;
      }

      // Update coins — attract toward player when nearby, collect on touch
      const pcx = player.x + player.w / 2;
      const pcy = player.y + player.h / 2;
      for (const c of coins) {
        if (c.collected) continue;
        const dx = pcx - c.x;
        const dy = pcy - c.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < COIN_ATTRACT_RADIUS) {
          // slide toward player
          c.x += (dx / dist) * COIN_ATTRACT_SPEED;
          c.y += (dy / dist) * COIN_ATTRACT_SPEED;
          // collect if close enough
          if (dist < player.w / 2 + c.r) {
            c.collected = true;
            score += c.value;
            if (score > highScore) { highScore = score; localStorage.setItem('flagquest_hs', highScore); }
            tone(880, 1200, 'sine', 0.4, 0.15);
            spawnCoinParticles(c.x, c.y);
            updateCoinCounter();
          }
        }
      }

      // Collect keys
      for (const k of levelKeys) {
        if (k.collected) continue;
        const dx = (player.x + player.w / 2) - k.x;
        const dy = (player.y + player.h / 2) - k.y;
        if (Math.sqrt(dx*dx + dy*dy) < player.w / 2 + 10) {
          k.collected = true;
          collectedKeys++;
          tone(600, 1400, 'sine', 0.5, 0.3);
        }
      }

      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= 0.04;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // Update enemies + check collision with player
      for (const e of enemies) {
        e.x += e.vx;
        if (e.x <= e.platform.x || e.x + e.w >= e.platform.x + e.platform.w) {
          e.vx *= -1;
        }

        // Simple AABB hit — lose a life
        const hit = player.x < e.x + e.w && player.x + player.w > e.x &&
                    player.y < e.y + e.h && player.y + player.h > e.y;
        if (hit) { loseLife(); return; }
      }
    }

    // Draw the mushroom character (based on the sketch)
    function drawCharacter(cx, cy, facingRight) {
      ctx.save();
      ctx.translate(cx, cy);
      if (!facingRight) { ctx.scale(-1, 1); }

      ctx.strokeStyle = '#111';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Cap (mushroom top)
      ctx.beginPath();
      ctx.ellipse(0, -28, 20, 14, 0, Math.PI, 0); // upper half ellipse
      ctx.stroke();

      // Cap brim curve
      ctx.beginPath();
      ctx.moveTo(-22, -14);
      ctx.quadraticCurveTo(0, -8, 22, -14);
      ctx.stroke();

      // Body / stem
      ctx.beginPath();
      ctx.moveTo(-6, -12);
      ctx.lineTo(-6, 10);
      ctx.lineTo(6, 10);
      ctx.lineTo(6, -12);
      ctx.stroke();

      // Left arm (holding something)
      ctx.beginPath();
      ctx.moveTo(-6, -2);
      ctx.quadraticCurveTo(-18, 4, -14, 14);
      ctx.stroke();

      // Hand / item at end of arm
      ctx.beginPath();
      ctx.arc(-14, 16, 4, 0, Math.PI * 2);
      ctx.stroke();

      // Right arm
      ctx.beginPath();
      ctx.moveTo(6, -2);
      ctx.lineTo(14, 4);
      ctx.stroke();

      // Legs
      ctx.beginPath();
      ctx.moveTo(-3, 10);
      ctx.lineTo(-5, 24);   // left leg
      ctx.moveTo(3, 10);
      ctx.lineTo(5, 24);    // right leg
      ctx.stroke();

      // Feet
      ctx.beginPath();
      ctx.moveTo(-10, 24);
      ctx.lineTo(0, 24);    // left foot
      ctx.moveTo(0, 24);
      ctx.lineTo(10, 24);   // right foot
      ctx.stroke();

      // Eye
      ctx.beginPath();
      ctx.arc(5, -20, 2, 0, Math.PI * 2);
      ctx.fillStyle = '#111';
      ctx.fill();

      ctx.restore();
    }

    // Draw a simple spiky enemy
    function drawEnemy(cx, cy, facingRight, color) {
      color = color || '#111';
      ctx.save();
      ctx.translate(cx, cy);
      if (!facingRight) ctx.scale(-1, 1);

      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Round body
      ctx.beginPath();
      ctx.arc(0, -8, 14, 0, Math.PI * 2);
      ctx.stroke();

      // Spikes on top
      for (let i = -2; i <= 2; i++) {
        const bx = i * 7;
        const by = -8 - Math.sqrt(Math.max(0, 14 * 14 - bx * bx));
        ctx.beginPath();
        ctx.moveTo(bx, by);
        ctx.lineTo(bx + 3, by - 8);
        ctx.stroke();
      }

      // Eyes (angry)
      ctx.beginPath();
      ctx.moveTo(-6, -12);
      ctx.lineTo(-2, -10);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(-4, -8, 2, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(5, -8, 2, 0, Math.PI * 2);
      ctx.fill();

      // Stubby legs
      ctx.strokeStyle = color;
      ctx.beginPath();
      ctx.moveTo(-5, 6);
      ctx.lineTo(-7, 18);
      ctx.moveTo(5, 6);
      ctx.lineTo(7, 18);
      ctx.stroke();

      ctx.restore();
    }

    function drawFlag() {
      const px = flag.x, py = flag.y;
      // Pole
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px, py - 52);
      ctx.stroke();
      // Flag triangle
      ctx.fillStyle = '#e53935';
      ctx.beginPath();
      ctx.moveTo(px, py - 52);
      ctx.lineTo(px + 30, py - 41);
      ctx.lineTo(px, py - 30);
      ctx.closePath();
      ctx.fill();
      // Star on flag
      ctx.fillStyle = 'white';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('★', px + 6, py - 37);
    }

    function drawLives() {
      const r = 10, spacing = 28, startX = 20, y = 20;
      for (let i = 0; i < maxLives; i++) {
        ctx.beginPath();
        ctx.arc(startX + i * spacing, y, r, 0, Math.PI * 2);
        ctx.fillStyle = i < lives ? 'red' : 'black';
        ctx.fill();
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }

    function drawBackground() {
      // Sky gradient — red/dark for Level 3, purple otherwise
      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
      if (currentLevel === 3) {
        sky.addColorStop(0, '#1a0000');
        sky.addColorStop(1, '#7f1d1d');
      } else {
        sky.addColorStop(0, '#a78bfa');
        sky.addColorStop(1, '#e9d5ff');
      }
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Distant hills
      ctx.fillStyle = currentLevel === 3 ? 'rgba(180,20,20,0.3)' : 'rgba(167,139,250,0.35)';
      ctx.beginPath();
      ctx.moveTo(0, canvas.height);
      ctx.bezierCurveTo(100, 320, 250, 280, 400, 340);
      ctx.bezierCurveTo(550, 400, 650, 300, 800, 350);
      ctx.bezierCurveTo(950, 400, 1100, 310, 1200, 360);
      ctx.lineTo(1200, canvas.height);
      ctx.closePath();
      ctx.fill();

      // Clouds
      ctx.fillStyle = currentLevel === 3 ? 'rgba(180,50,50,0.4)' : 'rgba(255,255,255,0.75)';
      for (const c of clouds) {
        ctx.beginPath();
        ctx.ellipse(c.x,          c.y,          c.w * 0.5, c.h * 0.5, 0, 0, Math.PI * 2);
        ctx.ellipse(c.x + c.w*0.3, c.y - c.h*0.2, c.w * 0.35, c.h * 0.45, 0, 0, Math.PI * 2);
        ctx.ellipse(c.x - c.w*0.3, c.y - c.h*0.1, c.w * 0.3,  c.h * 0.4,  0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawKeyItem(x, y) {
      ctx.save();
      ctx.translate(x, y);
      ctx.strokeStyle = '#fbbf24';
      ctx.fillStyle = '#fbbf24';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      // ring
      ctx.beginPath();
      ctx.arc(0, -6, 6, 0, Math.PI * 2);
      ctx.stroke();
      // shaft
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(0, 10);
      ctx.stroke();
      // teeth
      ctx.beginPath();
      ctx.moveTo(0, 5); ctx.lineTo(4, 5);
      ctx.moveTo(0, 8); ctx.lineTo(3, 8);
      ctx.stroke();
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Screen shake
      ctx.save();
      if (shakeFrames > 0) {
        const mag = shakeFrames * 0.8;
        ctx.translate(
          (Math.random() * 2 - 1) * mag,
          (Math.random() * 2 - 1) * mag
        );
        shakeFrames--;
      }

      drawBackground();

      // Draw platforms as thick grass blocks (drawn first, behind character)
      for (const p of platforms) {
        // Dirt body
        ctx.fillStyle = '#8B5E3C';
        ctx.fillRect(p.x, p.y + 3, p.w, 10);
        // Grass top
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(p.x, p.y, p.w, 3);
        // Highlight stripe
        ctx.fillStyle = '#66BB6A';
        ctx.fillRect(p.x, p.y, p.w, 1);
      }

      // Draw coins
      for (const c of coins) {
        if (c.collected) continue;
        ctx.save();
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fillStyle = c.color;
        ctx.fill();
        ctx.strokeStyle = c.border;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = c.border;
        ctx.font = 'bold 8px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(c.value > 1 ? c.value : '$', c.x, c.y);
        ctx.restore();
      }

      // Draw keys
      for (const k of levelKeys) {
        if (k.collected) continue;
        drawKeyItem(k.x, k.y);
      }

      drawFlag();

      // Draw enemies
      const enemyColor = currentLevel >= 2 ? '#c0392b' : '#111';
      for (const e of enemies) {
        const facingRight = e.vx > 0;
        drawEnemy(e.x + e.w / 2, e.y + e.h - 18, facingRight, enemyColor);
      }

      // Draw character — flash every 6 frames while invincible
      if (invincible === 0 || Math.floor(invincible / 6) % 2 === 0) {
        const cx = player.x + player.w / 2;
        const cy = player.y + player.h - 24;
        drawCharacter(cx, cy, player.facingRight);
      }

      // Draw particles
      for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
        ctx.restore();
      }

      drawLives();

      // Draw coin score
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillStyle = '#FFD700';
      ctx.fillText('$ ' + score, 16, 50);

      // Draw high score
      ctx.font = '14px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText('Best: ' + highScore, 16, 70);

      // Draw key count
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillStyle = '#fbbf24';
      ctx.fillText('🗝️ ' + collectedKeys, 16, 90);

      // Draw level indicator
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.fillText('Level ' + currentLevel, canvas.width - 16, 55);

      // Draw countdown timer
      if (!gameOver && !gameWon) {
        const remaining = timerEnd ? Math.max(0, timerEnd - performance.now()) : timerRemaining;
        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        ctx.font = 'bold 20px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillStyle = remaining < 60000 ? 'red' : '#333';
        ctx.fillText(timeStr, canvas.width - 16, 30);
      }

      ctx.restore(); // end screen shake transform

      if (paused && !gameOver && !gameWon) {
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.font = 'bold 36px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Click "Level 1" to start!', canvas.width / 2, canvas.height / 2);
      }

      if (gameWon) {
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 64px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('YOU WIN! 🎉', canvas.width / 2, canvas.height / 2 - 30);
        ctx.fillStyle = 'white';
        ctx.font = '28px sans-serif';
        ctx.fillText('Congratulations!', canvas.width / 2, canvas.height / 2 + 20);
        ctx.font = '18px sans-serif';
        ctx.fillText('Press any key to play again', canvas.width / 2, canvas.height / 2 + 60);
      }

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.font = 'bold 52px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(timeUp ? "TIME'S UP!" : 'GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = '22px sans-serif';
        ctx.fillText('Press any key to play again', canvas.width / 2, canvas.height / 2 + 30);
      }

      // Show/hide continue button
      const btnContinue = document.getElementById('btn-continue');
      btnContinue.style.display = (gameOver && !timeUp && collectedKeys > 0) ? 'block' : 'none';
      if (gameOver && !timeUp && collectedKeys > 0) {
        btnContinue.textContent = '🗝️ Continue (uses 1 key, you have ' + collectedKeys + ')';
      }
    }

    function startLevel1() {
      const btn = document.getElementById('btn-level1');
      const levelNum = parseInt(btn.textContent.replace('Level ', '')) || 1;
      currentLevel = levelNum;

      // Reset game state
      score = 0; gameOver = false; gameWon = false; invincible = 0; timeUp = false;
      timerLevel = Math.min(timerLevel + 1, TIMER_LEVELS.length - 1);
      timerRemaining = currentTimerMs();
      player.x = 70; player.y = GROUND_Y - player.h;
      player.vx = 0; player.vy = 0;

      // Reset keys
      collectedKeys = 0;
      levelKeys.forEach(k => { k.collected = false; });

      // Reset moving platforms
      for (const p of platforms) { if (p.moveSpeed) { p.x = p.baseX; p.moveDir = 1; } }

      // Reset coins with fresh tiers
      let ci = 0;
      for (const p of platforms) {
        const count = 3;
        for (let i = 0; i < count; i++) {
          const tier = coinTier();
          coins[ci].x = p.x + (p.w / (count + 1)) * (i + 1);
          coins[ci].y = p.y - 14;
          coins[ci].collected = false;
          coins[ci].value = tier.value;
          coins[ci].color = tier.color;
          coins[ci].border = tier.border;
          ci++;
        }
      }
      updateCoinCounter();

      if (currentLevel === 3) {
        resetEnemies(4);
        maxLives = 3;
      } else if (currentLevel === 2) {
        resetEnemies(2.5);
        maxLives = 5;
      } else {
        resetEnemies(0.8);
        maxLives = 3;
      }
      lives = maxLives;

      if (!gameOver && !gameWon) {
        paused = false;
        timerEnd = performance.now() + timerRemaining;
        unlockAudio();
        btn.disabled = true;
      }
    }

    function continueGame() {
      if (!gameOver || collectedKeys <= 0) return;
      collectedKeys--;
      lives = 1;
      gameOver = false;
      invincible = 90;
      timerEnd = performance.now() + Math.max(timerRemaining, 30000);
      document.getElementById('btn-continue').style.display = 'none';
      unlockAudio();
    }

    function loop() {
      if (!gameOver && !gameWon && !paused) update();
      draw();
      requestAnimationFrame(loop);
    }

    updateCoinCounter();
    loop();
  </script>
</body>
</html>
